<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>365 Dias</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#0f1115;
      color:white;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:40px 20px;
    }

    h1{
      font-size:2.2rem;
      margin-bottom:10px;
    }

    .datetime{
      margin-bottom:25px;
      text-align:center;
      color:#cfcfcf;
      line-height:1.8;
    }

    .date{
      font-size:1.2rem;
    }

    .clock{
      font-size:2rem;
      font-weight:bold;
      color:#4ade80;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(31, 14px);
      gap:8px;
      max-width:700px;
      justify-content:center;
      margin-top:20px;
    }

    .dot{
      width:14px;
      height:14px;
      border-radius:50%;
      background:#2b2f38;
      transition:0.3s;
    }

    .passed{
      background:#ffffff;
      box-shadow:0 0 6px rgba(255,255,255,0.7);
    }

    .today{
      background:#4ade80;
      transform:scale(1.3);
      box-shadow:0 0 10px #4ade80;
    }

    .info{
      margin-top:30px;
      text-align:center;
      line-height:1.8;
    }

    .number{
      font-size:2rem;
      font-weight:bold;
    }
  </style>
</head>
<body>

  <h1>365 Dias</h1>

  <div class="datetime">
    <div class="date" id="date"></div>
    <div class="clock" id="clock"></div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="info">
    <div>
      Dia atual:
      <span class="number" id="currentDay"></span>
    </div>

    <div>
      Restam:
      <span class="number" id="remaining"></span>
      dias
    </div>
  </div>

  <script>

    // =========================
    // DATA E HORÁRIO
    // =========================

    function updateDateTime(){

      const now = new Date();

      const options = {
        weekday:'long',
        year:'numeric',
        month:'long',
        day:'numeric'
      };

      const formattedDate =
        now.toLocaleDateString('pt-BR', options);

      const formattedTime =
        now.toLocaleTimeString('pt-BR');

      document.getElementById('date').textContent =
        formattedDate;

      document.getElementById('clock').textContent =
        formattedTime;
    }

    setInterval(updateDateTime, 1000);

    updateDateTime();

    // =========================
    // CONTADOR DOS DIAS
    // =========================

    const grid = document.getElementById("grid");

    const now = new Date();

    const startOfYear = new Date(now.getFullYear(), 0, 0);

    const diff = now - startOfYear;

    const oneDay = 1000 * 60 * 60 * 24;

    const currentDay = Math.floor(diff / oneDay);

    const totalDays =
      ((now.getFullYear() % 4 === 0 &&
      now.getFullYear() % 100 !== 0) ||
      now.getFullYear() % 400 === 0)
        ? 366
        : 365;

    document.getElementById("currentDay").textContent =
      currentDay;

    document.getElementById("remaining").textContent =
      totalDays - currentDay;

    for(let i = 1; i <= totalDays; i++){

      const dot = document.createElement("div");

      dot.classList.add("dot");

      if(i < currentDay){
        dot.classList.add("passed");
      }

      if(i === currentDay){
        dot.classList.add("today");
      }

      grid.appendChild(dot);
    }

  </script>

</body>
</html>
